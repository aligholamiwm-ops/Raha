version: "3.9"

services:
  # -------------------------------------------------------------------------
  # FastAPI application
  # -------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raha_app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # -------------------------------------------------------------------------
  # Celery worker
  # -------------------------------------------------------------------------
  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raha_worker
    restart: unless-stopped
    env_file: .env
    command: celery -A app.celery_worker.celery_app worker --loglevel=info --concurrency=4
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy

  # -------------------------------------------------------------------------
  # Celery beat (scheduler)
  # -------------------------------------------------------------------------
  beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: raha_beat
    restart: unless-stopped
    env_file: .env
    command: celery -A app.celery_worker.celery_app beat --loglevel=info
    depends_on:
      - redis
      - mongodb

  # -------------------------------------------------------------------------
  # MongoDB
  # -------------------------------------------------------------------------
  mongodb:
    image: mongo:7.0
    container_name: raha_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_DATABASE: raha_vpn
    volumes:
      - mongodb_data:/data/db
    ports:
      - "27017:27017"
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  # -------------------------------------------------------------------------
  # Redis
  # -------------------------------------------------------------------------
  redis:
    image: redis:7.2-alpine
    container_name: raha_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  mongodb_data:
  redis_data:
